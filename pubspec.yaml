name: sqlite_httpvfs
description: >
  HTTP range-request VFS for the sqlite3 Dart package. Query remote SQLite
  databases by fetching only the pages needed — the Dart equivalent of
  sql.js-httpvfs.
homepage: https://github.com/moham96/sqlite_httpvfs
repository: https://github.com/moham96/sqlite_httpvfs
version: 0.2.0

environment:
  sdk: ^3.4.0

dependencies:
  sqlite3: ^2.4.0

dev_dependencies:
  test: ^1.24.0

# The PEM blob in test/test_certs.dart is a self-signed cert generated for
# loopback HTTPS unit tests — never used outside the test suite.
false_secrets:
  - /test/test_certs.dart
